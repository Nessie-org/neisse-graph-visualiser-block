<svg id="main_view" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
      refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>
  <g id="edges"></g>
  <g id="nodes"></g>
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<script>
const GRAPH_DATA = __GRAPH_DATA__;

const ROW_H   = 20;
const PADDING = 12;
const W       = window.innerWidth  || 0;
const H       = window.innerHeight || 0;

const layerEdges = d3.select('#edges');
const layerNodes = d3.select('#nodes');
const nodeMap    = {};

/* give each node a random start position */
GRAPH_DATA.nodes.forEach((n, i) => {
  n.x = Math.random() * W * 0.7 + W * 0.1;
  n.y = Math.random() * H * 0.7 + H * 0.1;
});

/* ── build node groups ───────────────────────────────────────────── */
const nodeGroups = layerNodes.selectAll('.node')
  .data(GRAPH_DATA.nodes)
  .join('g')
  .attr('class',     'node')
  .attr('node',      '')            
  .attr('transform', d => `translate(${d.x},${d.y})`);

nodeGroups.each(function(d) {
  const g     = d3.select(this);
  const attrs = Object.entries(d.attributes || {});
  const texts = [];

  texts.push(
    g.append('text')
      .attr('font-size',   '13px')
      .attr('font-weight', 'bold')
      .attr('font-family', 'monospace')
      .attr('fill',        '#ffffff')
      .text(d.id)
  );

  attrs.forEach(([k, v]) => {
    texts.push(
      g.append('text')
        .attr('font-size',   '11px')
        .attr('font-family', 'monospace')
        .attr('fill',        '#ffffff')
        .text(`${k}: ${v}`)
    );
  });

  let maxWidth = 0;
  texts.forEach(t => {
    const w = t.node().getBBox().width;
    if (w > maxWidth) maxWidth = w;
  });

  const width  = maxWidth + PADDING * 2;
  const height = texts.length * ROW_H + PADDING * 1.5;
  d.width  = width;
  d.height = height;

  g.insert('rect', ':first-child')
    .attr('width',        width)
    .attr('height',       height)
    .attr('rx',           4)
    .attr('fill',         '#1e2130')
    .attr('stroke',       '#3b82f6')
    .attr('stroke-width', 1.5);

  g.insert('rect', 'text')
    .attr('width',  width)
    .attr('height', ROW_H + 6)
    .attr('rx',     4)
    .attr('fill',   '#3b82f6');

  texts.forEach((t, i) => {
    t.attr('x', PADDING).attr('y', ROW_H + i * ROW_H);
  });

  nodeMap[d.id] = d;
});


const nodeIndex = {};
GRAPH_DATA.nodes.forEach((n, i) => { nodeIndex[n.id] = i; });

let edges = layerEdges.selectAll('.edge')
  .data(GRAPH_DATA.edges)
  .join('line')
  .attr('edge',         '')
  .attr('class',        'edge')
  .attr('stroke',       '#475569')
  .attr('stroke-width', 1.5)
  .attr('data-source',  d => nodeIndex[d.source])
  .attr('data-target',  d => nodeIndex[d.target])
  .attr('x1', d => nodeMap[d.source].x)
  .attr('y1', d => nodeMap[d.source].y)
  .attr('x2', d => nodeMap[d.target].x)
  .attr('y2', d => nodeMap[d.target].y);
  if(GRAPH_DATA.type === 'directed') {
    edges.attr('marker-end', 'url(#arrowhead)');
  }
</script>
